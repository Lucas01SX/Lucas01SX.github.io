<section id="contact" class="contact section" *transloco="let t">
  <div class="container">
    <h2 class="contact__heading">{{ t('contact.heading') }}</h2>
    <div class="contact__links">
      <a
        href="https://github.com/Lucas01SX"
        aria-label="GitHub"
        class="contact__link"
        data-testid="contact-github"
        target="_blank"
        rel="noopener noreferrer"
        >GitHub</a
      >
      <a
        href="https://www.linkedin.com/in/lucas-dev-dotnet"
        aria-label="LinkedIn"
        class="contact__link"
        data-testid="contact-linkedin"
        target="_blank"
        rel="noopener noreferrer"
        >LinkedIn</a
      >
      <a
        href="mailto:lukassantana351@gmail.com"
        aria-label="Email"
        class="contact__link"
        data-testid="contact-email"
        >lukassantana351@gmail.com</a
      >
    </div>
    <form
      class="contact__form"
      data-testid="contact-form"
      action="https://api.web3forms.com/submit"
      method="POST"
    >
      <input type="hidden" name="access_key" value="b3ee9b6c-6b8b-431e-93b8-40fe48cb9a8c" />
      <div class="contact__field">
        <label for="contact-name">{{ t('contact.name') }}</label>
        <input
          id="contact-name"
          type="text"
          name="name"
          required
          autocomplete="name"
          data-testid="field-name"
        />
      </div>
      <div class="contact__field">
        <label for="contact-email">{{ t('contact.email') }}</label>
        <input
          id="contact-email"
          type="email"
          name="email"
          required
          autocomplete="email"
          data-testid="field-email"
        />
      </div>
      <div class="contact__field">
        <label for="contact-message">{{ t('contact.message') }}</label>
        <textarea
          id="contact-message"
          name="message"
          required
          rows="5"
          data-testid="field-message"
        ></textarea>
      </div>
      <button type="submit" class="contact__submit" data-testid="form-submit">
        {{ t('contact.submit') }}
      </button>
    </form>
  </div>
</section>
