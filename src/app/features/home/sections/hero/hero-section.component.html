<section class="hero" *transloco="let t">
  <div class="hero__bg" aria-hidden="true"></div>
  <div class="container hero__inner">
    <div class="hero__eyebrow" appReveal>
      <span>{{ t('hero.eyebrow') }}</span>
    </div>

    <h1 class="hero__name" data-testid="hero-name" appReveal [revealDelay]="80">
      Lucas<br />Santana
    </h1>

    <p class="hero__role" data-testid="hero-title" appReveal [revealDelay]="160">
      <b>.NET</b><span class="dot">·</span><b>Angular</b><span class="dot">·</span><b>TypeScript</b>
    </p>

    <p class="hero__lede" appReveal [revealDelay]="240">
      {{ t('hero.subtitle') }}
    </p>

    <div class="hero__ctas" appReveal [revealDelay]="320">
      <a data-testid="cta-projects" routerLink="/projects" class="btn btn--primary">
        {{ t('hero.cta_projects') }} <span class="arrow">→</span>
      </a>
      <a data-testid="cta-contact" routerLink="/contact" class="btn btn--ghost">
        {{ t('hero.cta_contact') }}
      </a>
    </div>
  </div>
</section>
