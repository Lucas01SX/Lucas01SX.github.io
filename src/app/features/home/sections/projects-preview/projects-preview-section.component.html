<section class="projects-preview section">
  <div class="container">
    <h2 class="projects-preview__heading">Projects</h2>
    <ul class="projects-preview__grid" data-testid="project-cards">
      @for (project of projects; track project.slug) {
        <li class="project-card" data-testid="project-card">
          <h3 class="project-card__title">{{ project.title }}</h3>
          <p class="project-card__description">{{ project.description }}</p>
          <ul class="project-card__stack">
            @for (tech of project.stack; track tech) {
              <li class="project-card__tech">{{ tech }}</li>
            }
          </ul>
          <a
            [routerLink]="['/projects', project.slug]"
            class="project-card__link"
            data-testid="project-link"
          >
            View Project
          </a>
        </li>
      }
    </ul>
    <a routerLink="/projects" class="projects-preview__all" data-testid="all-projects-link">
      View all projects
    </a>
  </div>
</section>
