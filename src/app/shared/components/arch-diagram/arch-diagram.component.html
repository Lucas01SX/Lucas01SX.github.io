<svg
  viewBox="-10 -2 120 104"
  preserveAspectRatio="xMidYMid meet"
  class="arch-svg"
  aria-hidden="true"
>
  <defs>
    <marker
      id="arch-arrow"
      viewBox="0 0 10 10"
      refX="9"
      refY="5"
      markerWidth="6"
      markerHeight="6"
      orient="auto-start-reverse"
    >
      <path d="M0,0 L10,5 L0,10 z" fill="var(--text-3)" />
    </marker>
  </defs>

  @for (e of rendered().edges; track $index) {
    <line
      [attr.x1]="e.from.x"
      [attr.y1]="e.from.y + 4"
      [attr.x2]="e.to.x"
      [attr.y2]="e.to.y - 4"
      stroke="var(--text-3)"
      stroke-width="0.25"
      stroke-dasharray="0.6 0.6"
      marker-end="url(#arch-arrow)"
      opacity="0.7"
    />
  }

  @for (n of rendered().nodes; track n.id) {
    <g [attr.transform]="'translate(' + (n.x - n.w / 2) + ' ' + (n.y - n.h / 2) + ')'">
      @if (n.type === 'db') {
        <ellipse
          [attr.cx]="n.w / 2"
          cy="1.5"
          [attr.rx]="n.w / 2"
          ry="1.4"
          fill="var(--surface)"
          stroke="var(--accent)"
          stroke-width="0.25"
        />
        <rect
          x="0"
          y="1.5"
          [attr.width]="n.w"
          [attr.height]="n.h - 3"
          fill="var(--surface)"
          stroke="var(--accent)"
          stroke-width="0.25"
        />
        <ellipse
          [attr.cx]="n.w / 2"
          [attr.cy]="n.h - 1.5"
          [attr.rx]="n.w / 2"
          ry="1.4"
          fill="var(--surface)"
          stroke="var(--accent)"
          stroke-width="0.25"
        />
      } @else {
        <rect
          x="0"
          y="0"
          [attr.width]="n.w"
          [attr.height]="n.h"
          rx="1"
          [attr.fill]="
            n.type === 'entry'
              ? 'var(--accent-soft)'
              : n.type === 'shared'
                ? 'var(--surface)'
                : 'var(--bg-card)'
          "
          [attr.stroke]="n.type === 'entry' ? 'var(--accent)' : 'var(--border-strong)'"
          stroke-width="0.3"
        />
      }
      <text
        [attr.x]="n.w / 2"
        [attr.y]="n.h / 2 + 1.3"
        text-anchor="middle"
        font-size="2.6"
        [attr.fill]="n.type === 'entry' ? 'var(--accent)' : 'var(--text)'"
        font-weight="500"
        class="arch-svg__text"
      >
        {{ n.label }}
      </text>
    </g>
  }
</svg>
